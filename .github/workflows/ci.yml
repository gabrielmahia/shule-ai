name: CI — Lint & Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip ruff pytest pandas
      - run: ruff check . --ignore E501
      - run: pytest tests/ -v --tb=short
        continue-on-error: true
